name: CI/CD Frontend

# ─────────────────────────────────────────────────────────────────────────────
# Secrets requis (Settings > Secrets > Actions) :
#
#   Serveur       SERVER_HOST · SERVER_USER · SERVER_SSH_KEY · SERVER_SSH_KNOWN_HOST
#   Stripe        STRIPE_PUBLISHABLE_KEY
#   OAuth         GOOGLE_CLIENT_ID
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  NODE_VERSION: '20'

jobs:

  # ══════════════════════════════════════════════════════════════════════════════
  # 1. LINT — ESLint (eslint-config-next, bloquant)
  # ══════════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ══════════════════════════════════════════════════════════════════════════════
  # 2. TESTS — Vitest · couverture ≥ 85% (lib/utils.ts · utils/photon.ts)
  # ══════════════════════════════════════════════════════════════════════════════
  tests:
    name: Tests · coverage ≥ 85%
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Unit tests + coverage (seuil 85%)
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-frontend
          path: coverage/lcov.info
          retention-days: 7
          if-no-files-found: ignore

  # ══════════════════════════════════════════════════════════════════════════════
  # 3. BUILD — tsc --noEmit + next build (vérification TypeScript + compilation)
  # ══════════════════════════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: TypeScript check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Next.js build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_MINIO_URL: http://localhost:9000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: placeholder.apps.googleusercontent.com
          NEXT_PUBLIC_UMAMI_SCRIPT_URL: https://placeholder.umami.com/script.js
          NEXT_PUBLIC_UMAMI_WEBSITE_ID: 00000000-0000-0000-0000-000000000000
          NEXT_PUBLIC_UMAMI_HOST_URL: https://placeholder.umami.com
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

  # ══════════════════════════════════════════════════════════════════════════════
  # 4. SECURITY — npm audit (bloquant sur high+, informatif)
  # ══════════════════════════════════════════════════════════════════════════════
  security:
    name: Security · npm audit
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true   # informatif : n'empêche pas le déploiement

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: npm audit (--audit-level=high)
        run: npm audit --audit-level=high --omit=dev

  # ══════════════════════════════════════════════════════════════════════════════
  # 5. E2E — Playwright · Chromium · circuit complet (mock backend, sans service)
  #          workers: 1 en CI · retries: 2 · webServer: next dev
  # ══════════════════════════════════════════════════════════════════════════════
  e2e:
    name: E2E · Playwright
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browsers (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_MINIO_URL: http://localhost:9000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: placeholder.apps.googleusercontent.com
          NEXT_PUBLIC_UMAMI_SCRIPT_URL: https://placeholder.umami.com/script.js
          NEXT_PUBLIC_UMAMI_WEBSITE_ID: 00000000-0000-0000-0000-000000000000
          NEXT_PUBLIC_UMAMI_HOST_URL: https://placeholder.umami.com
          NEXT_TELEMETRY_DISABLED: 1
          JWT_SECRET: ci-test-jwt-secret-32chars-min!!
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload screenshots & traces (échecs)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failures
          path: test-results/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════════
  # 6. DOCKER BUILD — build + push GHCR (master uniquement)
  # ══════════════════════════════════════════════════════════════════════════════
  docker-build:
    name: Docker · frontend
    runs-on: ubuntu-latest
    needs: [build, security, e2e, tests]
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push · frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ${{ env.REGISTRY }}/craftea-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/craftea-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://craftea.ddnsfree.com
            NEXT_PUBLIC_MINIO_URL=https://craftea.ddnsfree.com/files
            NEXT_PUBLIC_APP_URL=https://craftea.ddnsfree.com
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_UMAMI_SCRIPT_URL=https://craftea.ddnsfree.com:3009/script.js
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=eb09285b-2326-4dc6-8de8-133a375b3a37
            NEXT_PUBLIC_UMAMI_HOST_URL=https://craftea.ddnsfree.com:3009

  # ══════════════════════════════════════════════════════════════════════════════
  # 7. DEPLOY — SSH → docker service update --with-registry-auth (master uniquement)
  # ══════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy → Swarm
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SERVER_SSH_KNOWN_HOST }}" > ~/.ssh/known_hosts

      - name: Docker context (Swarm via SSH)
        run: |
          docker context create prod \
            --docker "host=ssh://${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
          docker context use prod

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: docker service update
        run: |
          docker service update \
            --image ${{ env.REGISTRY }}/craftea-frontend:${{ github.sha }} \
            --with-registry-auth \
            craftea_frontend

  # ══════════════════════════════════════════════════════════════════════════════
  # 8. HEALTHCHECK — curl https://craftea.ddnsfree.com (master uniquement)
  # ══════════════════════════════════════════════════════════════════════════════
  healthcheck:
    name: Healthcheck
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Attendre le démarrage du service (30s)
        run: sleep 30

      - name: curl /
        run: |
          curl \
            --fail \
            --retry 6 \
            --retry-delay 10 \
            --retry-all-errors \
            --max-time 15 \
            --silent \
            --show-error \
            https://craftea.ddnsfree.com
