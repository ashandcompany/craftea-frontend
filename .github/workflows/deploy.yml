name: Deploy Frontend to Production

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

# ─────────────────────────────────────────────────────────────────────────────
# Secrets à configurer dans le repo FRONTEND (Settings > Secrets > Actions) :
#
#   SERVER_HOST            = 51.178.27.251
#   SERVER_USER            = debian
#   SERVER_SSH_KEY         = contenu de ~/.ssh/id_rsa
#   SERVER_SSH_KNOWN_HOST  = sortie de : ssh-keyscan 51.178.27.251
#
#   STRIPE_PUBLISHABLE_KEY = pk_live_...
#   GOOGLE_CLIENT_ID       = ...apps.googleusercontent.com
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  build-and-deploy:
    name: Build & Deploy frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ${{ env.REGISTRY }}/craftea-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/craftea-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ secrets.SERVER_HOST }}:3001
            NEXT_PUBLIC_MINIO_URL=http://${{ secrets.SERVER_HOST }}:9000
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SERVER_SSH_KNOWN_HOST }}" > ~/.ssh/known_hosts

      - name: Create Docker context (remote swarm via SSH)
        run: |
          docker context create prod \
            --docker "host=ssh://${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
          docker context use prod

      - name: Login GHCR (pour --with-registry-auth)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update frontend service
        run: |
          docker service update \
            --image ${{ env.REGISTRY }}/craftea-frontend:${{ github.sha }} \
            --with-registry-auth \
            craftea_frontend
